name: Bug Report
description: Report a bug in AgentAnycast
labels: ["bug"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - agentanycast-node (Go Daemon)
        - agentanycast-python (Python SDK)
        - agentanycast-relay (Relay Server)
        - agentanycast-proto (Proto Definitions)
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Install agentanycast v...
        2. Run the following code...
        3. Observe error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, Go version, etc.
      placeholder: |
        - OS: macOS 15.3 / Ubuntu 24.04 / Windows 11
        - Python: 3.12
        - agentanycast SDK version: 0.1.0
        - Daemon version: 0.1.0

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant log output.
      render: shell
